---
packages:
  remote_package:
    url: https://github.com/edwardtfn/TX-Ultimate-Easy
    # Or you can specify a version, like `ref: v2024.12.6` or
    # `ref: latest` to the latest non-stable
    ref: v2026.1.6
    refresh: 5min
    files:
      # Core (essential) packages
      - ESPHome/TX-Ultimate-Easy-ESPHome_core.yaml
      # Non-essential but recommended: hw_relays, hw_vibration, media_player
      - ESPHome/TX-Ultimate-Easy-ESPHome_standard.yaml

bluetooth_proxy:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${friendly_name} AP
    password: !secret wifi_password
