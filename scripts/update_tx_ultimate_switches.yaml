update_tx_ultimate_switches:
  alias: "Update TX Ultimate Switches Firmware"
  description: >-
    Sequentially updates firmware on all TX Ultimate Easy switches.
    Each device is updated one at a time to avoid overloading the
    ESPHome compilation process. Update entities are discovered
    dynamically by matching device friendly names.
  mode: single
  icon: mdi:cellphone-arrow-down
  sequence:
    - variables:
        tx_friendly_names:
          - "Craft Room Lightswitch"
          - "Ensuite Lightswitch"
          - "Front Hall Dual Lightswitch"
          - "Guest Bedroom Lightswitch"
          - "Hall Dual Lightswitch"
          - "Hall Single Lightswitch"
          - "Kitchen Lightswitch"
          - "Living Room Lightswitch"
          - "Master Bedroom Lightswitch"
          - "Study Lightswitch"
    - variables:
        tx_switch_entities: >-
          {% set ns = namespace(found=[]) %}
          {% for state in states.update %}
            {% set dev_id = device_id(state.entity_id) %}
            {% if dev_id %}
              {% set dev_name = device_attr(dev_id, 'name') %}
              {% if dev_name in tx_friendly_names %}
                {% set ns.found = ns.found + [state.entity_id] %}
              {% endif %}
            {% endif %}
          {% endfor %}
          {{ ns.found }}
        all_update_entities: >-
          {{ states.update | map(attribute='entity_id') | list }}
    - choose:
        - conditions:
            - condition: template
              value_template: >-
                {{ tx_switch_entities | length == 0 }}
          sequence:
            - action: persistent_notification.create
              data:
                title: "TX Ultimate Update Script"
                message: >-
                  No TX Ultimate update entities found.
                  Available update entities:
                  {{ all_update_entities | join(', ') }}
                notification_id: tx_ultimate_update_failed
            - stop: "No TX Ultimate update entities found"
    - action: logbook.log
      data:
        name: "TX Ultimate Update"
        message: >-
          Starting sequential firmware update for
          {{ tx_switch_entities | length }} devices:
          {{ tx_switch_entities | join(', ') }}
    - repeat:
        for_each: "{{ tx_switch_entities }}"
        sequence:
          - action: logbook.log
            data:
              name: "TX Ultimate Update"
              message: >-
                Updating {{ repeat.item }}
                ({{ repeat.index }}/{{ tx_switch_entities | length }})
          - action: update.install
            target:
              entity_id: "{{ repeat.item }}"
            continue_on_error: true
          - wait_template: >-
              {{ not is_state(repeat.item, 'on') }}
            timeout: "01:00:00"
            continue_on_timeout: true
          - delay:
              seconds: 30
