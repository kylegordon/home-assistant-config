update_tx_ultimate_switches:
  alias: "Update TX Ultimate Switches Firmware"
  description: >-
    Sequentially updates firmware on all TX Ultimate Easy switches.
    Each device is updated one at a time to avoid overloading the
    ESPHome compilation process. Discovers devices by finding
    TX Ultimate Easy firmware version sensors, then locates the
    corresponding update entities via the device registry.
  mode: single
  icon: mdi:cellphone-arrow-down
  sequence:
    - variables:
        tx_switch_entities: >-
          {% set ns = namespace(found=[]) %}
          {% for sensor in states.sensor
            if 'tx_ultimate_easy_firmware_version' in sensor.entity_id %}
            {% set dev = device_id(sensor.entity_id) %}
            {% if dev %}
              {% for entity in device_entities(dev)
                if entity.startswith('update.') %}
                {% set ns.found = ns.found + [entity] %}
              {% endfor %}
            {% endif %}
          {% endfor %}
          {{ ns.found }}
    - choose:
        - conditions:
            - condition: template
              value_template: >-
                {{ tx_switch_entities | length == 0 }}
          sequence:
            - action: persistent_notification.create
              data:
                title: "TX Ultimate Update Script"
                message: >-
                  No update entities found for TX Ultimate devices.
                  Ensure the ESPHome Dashboard add-on is installed
                  and the device configs are present in its
                  configuration directory.
                notification_id: tx_ultimate_update_failed
            - stop: "No TX Ultimate update entities found"
    - action: logbook.log
      data:
        name: "TX Ultimate Update"
        message: >-
          Starting sequential firmware update for
          {{ tx_switch_entities | length }} devices:
          {{ tx_switch_entities | join(', ') }}
    - repeat:
        for_each: "{{ tx_switch_entities }}"
        sequence:
          - action: logbook.log
            data:
              name: "TX Ultimate Update"
              message: >-
                Updating {{ repeat.item }}
                ({{ repeat.index }}/{{ tx_switch_entities | length }})
          - action: update.install
            target:
              entity_id: "{{ repeat.item }}"
            continue_on_error: true
          - wait_template: >-
              {{ not is_state(repeat.item, 'on') }}
            timeout: "01:00:00"
            continue_on_timeout: true
          - delay:
              seconds: 30
