update_tx_ultimate_switches:
  alias: "Update TX Ultimate Switches Firmware"
  description: >-
    Sequentially updates firmware on all TX Ultimate Easy switches.
    Each device is updated one at a time to avoid overloading the
    ESPHome compilation process.
  mode: single
  icon: mdi:cellphone-arrow-down
  sequence:
    - repeat:
        for_each:
          - update.craftroom_lightswitch_firmware
          - update.ensuite_lightswitch_firmware
          - update.front_hall_dual_lightswitch_firmware
          - update.guestbedroom_lightswitch_firmware
          - update.hall_dual_lightswitch_firmware
          - update.hall_single_lightswitch_firmware
          - update.kitchen_lightswitch_firmware
          - update.living_room_lightswitch_firmware
          - update.masterbedroom_lightswitch_firmware
          - update.study_lightswitch_firmware
        sequence:
          - action: update.install
            target:
              entity_id: "{{ repeat.item }}"
          - wait_template: >-
              {{ not is_state(repeat.item, 'on') }}
            timeout: "01:00:00"
            continue_on_timeout: true
          - delay:
              seconds: 30
