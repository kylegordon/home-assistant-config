---
group:
  christmas_lights:
    name: Christmas Lights
    entities:
      - switch.energenie_1
      - switch.energenie_2
      - switch.energenie_3
      - switch.energenie_4
      - light.christmas_tree
      - light.candle_arch
      - light.star_burst
      - light.christmas_star
      - switch.small_christmas_star

template:
  - binary_sensor:
      - name: Christmas Time
        unique_id: christmastime
        # Use %j to get the day of the year, force from string to integer, and return true if after December 1st or before January 6th
        state: >
            {% if now().strftime("%j") | int >= 336 or now().strftime("%j") | int <= 6 %}
            true
            {% else %}
            false
            {% endif %}

automation:
  - alias: Outside decorations - on evening
    id: outside_decorations_on_evening
    triggers:
      - trigger: numeric_state
        entity_id: sensor.average_external_light_level
        below: 500
        for:
          minutes: 10
    condition:
      - condition: state
        entity_id: binary_sensor.christmastime
        state: 'on'
    action:
      - service: homeassistant.turn_on
        entity_id: light.outside_decorations

  - alias: Outside decorations - on morning
    id: outside_decorations_on_morning
    triggers:
      - trigger: time
        at: "06:00:00"
    condition:
      - condition: state
        entity_id: binary_sensor.christmastime
        state: 'on'
    action:
      - service: homeassistant.turn_on
        entity_id: light.outside_decorations

  - alias: Outside decorations - off
    id: outside_decorations_off
    triggers:
      - trigger: time
        at: "00:00:00"
      - trigger: time
        at: "12:00:00"
      - trigger: numeric_state
        entity_id: sensor.average_external_light_level
        above: 500
        for:
          minutes: 10
    action:
      - service: homeassistant.turn_off
        entity_id: light.outside_decorations

  - alias: Christmas decorations - on
    id: christmas_decorations_on
    triggers:
      - trigger: state
        entity_id: binary_sensor.home_occupied
        from: "off"
        to: "on"
      - trigger: time
        at: "06:00:00"
    condition:
      - condition: state
        entity_id: binary_sensor.christmastime
        state: 'on'
    action:
      - service: homeassistant.turn_on
        entity_id: group.christmas_lights


  - alias: Christmas decorations - off
    id: christmas_decorations_off
    triggers:
      - trigger: state
        entity_id: binary_sensor.home_occupied
        from: "on"
        to: "off"
      - trigger: time
        at: "00:00:00"
    condition:
      - condition: state
        entity_id: binary_sensor.christmastime
        state: 'on'
    action:
      - service: homeassistant.turn_off
        entity_id: group.christmas_lights
